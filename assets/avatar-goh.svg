<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" rx="100" fill="#1a1a1a"/>
  <rect x="10" y="10" width="180" height="180" rx="90" fill="none" stroke="#ff2d2d" stroke-width="2" opacity="0.4"/>
  <!-- Headphones + music note -->
  <g transform="translate(100,88)">
    <!-- Headphone band -->
    <path d="M-30,10 C-30,-25 30,-25 30,10" stroke="#e8e8e8" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Left ear -->
    <rect x="-38" y="5" width="16" height="28" rx="6" fill="#e8e8e8"/>
    <!-- Right ear -->
    <rect x="22" y="5" width="16" height="28" rx="6" fill="#e8e8e8"/>
    <!-- Music notes -->
    <g fill="#ff2d2d">
      <circle cx="-5" cy="25" r="5"/>
      <rect x="-3" y="-5" width="2.5" height="30"/>
      <path d="-1,0 Q10,-8 -1,-5" fill="#ff2d2d"/>
      <rect x="-1" y="-5" width="14" height="2.5" rx="1"/>
      <rect x="10.5" y="-5" width="2.5" height="25"/>
      <circle cx="8" cy="20" r="5"/>
    </g>
  </g>
  <!-- Label -->
  <text x="100" y="158" text-anchor="middle" font-family="monospace" font-size="14" fill="#555">MUSIC</text>
</svg>
