<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="#0a0a0a" stroke="#ff2d2d" stroke-width="3"/>
  <circle cx="200" cy="200" r="175" fill="none" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Skull -->
  <g transform="translate(200, 170)">
    <!-- Skull shape -->
    <ellipse cx="0" cy="-20" rx="70" ry="80" fill="#e8e8e8"/>
    <rect x="-50" y="20" width="100" height="40" rx="8" fill="#e8e8e8"/>

    <!-- Eye sockets -->
    <ellipse cx="-25" cy="-25" rx="18" ry="22" fill="#0a0a0a"/>
    <ellipse cx="25" cy="-25" rx="18" ry="22" fill="#0a0a0a"/>

    <!-- Red glow in eyes -->
    <ellipse cx="-25" cy="-22" rx="8" ry="10" fill="#ff2d2d" opacity="0.9"/>
    <ellipse cx="25" cy="-22" rx="8" ry="10" fill="#ff2d2d" opacity="0.9"/>

    <!-- Nose -->
    <path d="M-7 5 L0 -5 L7 5 Z" fill="#0a0a0a"/>

    <!-- Teeth -->
    <line x1="-30" y1="35" x2="-30" y2="58" stroke="#0a0a0a" stroke-width="3"/>
    <line x1="-15" y1="35" x2="-15" y2="58" stroke="#0a0a0a" stroke-width="3"/>
    <line x1="0" y1="35" x2="0" y2="58" stroke="#0a0a0a" stroke-width="3"/>
    <line x1="15" y1="35" x2="15" y2="58" stroke="#0a0a0a" stroke-width="3"/>
    <line x1="30" y1="35" x2="30" y2="58" stroke="#0a0a0a" stroke-width="3"/>
  </g>

  <!-- Crossbones -->
  <g transform="translate(200, 295)" stroke="#e8e8e8" stroke-width="12" stroke-linecap="round">
    <line x1="-60" y1="-15" x2="60" y2="15"/>
    <line x1="-60" y1="15" x2="60" y2="-15"/>
    <circle cx="-65" cy="-18" r="8" fill="#e8e8e8" stroke="none"/>
    <circle cx="-65" cy="18" r="8" fill="#e8e8e8" stroke="none"/>
    <circle cx="65" cy="-18" r="8" fill="#e8e8e8" stroke="none"/>
    <circle cx="65" cy="18" r="8" fill="#e8e8e8" stroke="none"/>
  </g>

  <!-- "As" element symbol -->
  <text x="200" y="180" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#ff2d2d" opacity="0.6">As</text>

  <!-- Ring text - top -->
  <path id="topArc" d="M 60,200 A 140,140 0 0,1 340,200" fill="none"/>
  <text font-family="monospace" font-size="14" fill="#ff2d2d" letter-spacing="6">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">ARSENIC ADMINISTRATION</textPath>
  </text>

  <!-- Ring text - bottom -->
  <path id="bottomArc" d="M 340,210 A 140,140 0 0,1 60,210" fill="none"/>
  <text font-family="monospace" font-size="11" fill="#555555" letter-spacing="4">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">GAME STUDIO  ///  EST 2025</textPath>
  </text>
</svg>
